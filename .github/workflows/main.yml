name: Tennis Oracle Runner

on:
  schedule:
    - cron: '0 */6 * * *' # Jalan otomatis setiap 6 jam
  workflow_dispatch:      # Tombol manual tetap ada

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Update ke v4 agar mendukung Node.js terbaru
      - name: Checkout code
        uses: actions/checkout@v4

      # Update ke v5 agar mendukung Node.js terbaru
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas google-generativeai

      - name: Run Analyst Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py
