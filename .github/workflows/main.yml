name: Tennis Oracle Runner

on:
  schedule:
    - cron: '0 */6 * * *' # Otomatis jalan tiap 6 jam
  workflow_dispatch:      # Tombol manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10' # VERSI TERBARU

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas google-generativeai

      - name: Run Analyst Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py
