name: Tennis Oracle Quant V10

on:
  schedule:
    # Berjalan otomatis setiap 6 jam
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai

      - name: Run Analyst Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Commit and Push Parlay Database
        run: |
          git config --global user.name "Tennis-Oracle-Bot"
          git config --global user.email "bot@tennisoracle.com"
          git add parlay_raksasa.json
          git commit -m "Auto-update parlay database" || echo "No new matches to commit"
          git push
